spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    validate-on-migrate: true

logging:
  level:
    com.grocery: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
